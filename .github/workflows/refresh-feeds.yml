name: Refresh Live Feeds

on:
  schedule:
    # Every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch live feeds
        run: node scripts/fetch-live-feeds.mjs
        timeout-minutes: 2

      - name: Commit updated feed snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/aircraft-feed.json \
                  public/data/traffic-feed.geojson \
                  public/data/transit-feed.json \
                  public/data/weather-feed.json
          if git diff --cached --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "chore: refresh live feeds $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
